<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>台股股東會紀念品 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--br:#30363d;--br2:#484f58;--tx:#e6edf3;--tx2:#8b949e;--tx3:#6e7681;--gn:#3fb950;--gnb:rgba(63,185,80,.1);--bl:#58a6ff;--blb:rgba(88,166,255,.1);--am:#d29922;--amb:rgba(210,153,34,.1);--rd:#f85149;--rdb:rgba(248,81,73,.1);--pu:#bc8cff;--pub:rgba(188,140,255,.1);--fn:'Noto Sans TC',sans-serif;--mo:'DM Mono',monospace;--r:8px;--r2:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);font-size:14px;line-height:1.6;min-height:100vh}
/* Header */
.hdr{background:var(--bg2);border-bottom:1px solid var(--br);padding:0 24px;position:sticky;top:0;z-index:100}
.hdr-in{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:16px;height:56px}
.logo{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--gn);box-shadow:0 0 8px var(--gn);animation:glow 2s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 8px var(--gn)}50%{box-shadow:0 0 16px var(--gn)}}
.hbadge{font-size:11px;font-family:var(--mo);padding:2px 8px;border-radius:20px;background:var(--gnb);color:var(--gn);border:1px solid rgba(63,185,80,.3)}
.hlink{margin-left:auto;font-size:12px;color:var(--tx2);text-decoration:none;display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--br);border-radius:var(--r);transition:.2s;white-space:nowrap}
.hlink:hover{border-color:var(--br2);color:var(--tx)}
/* Main */
.main{max-width:1400px;margin:0 auto;padding:24px}
/* Metrics */
.mets{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.met{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r2);padding:16px 20px;position:relative;overflow:hidden;transition:.2s}
.met:hover{border-color:var(--br2)}
.met::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.met.g::before{background:var(--gn)}.met.b::before{background:var(--bl)}.met.a::before{background:var(--am)}.met.p::before{background:var(--pu)}
.met-l{font-size:11px;color:var(--tx2);margin-bottom:8px;font-family:var(--mo);letter-spacing:.5px;text-transform:uppercase}
.met-v{font-size:28px;font-weight:700;font-family:var(--mo)}
.met.g .met-v{color:var(--gn)}.met.b .met-v{color:var(--bl)}.met.a .met-v{color:var(--am)}.met.p .met-v{color:var(--pu)}
.met-s{font-size:11px;color:var(--tx3);margin-top:4px}
/* Divider */
.dv{border:none;border-top:1px solid var(--br);margin:28px 0}
/* Section header */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.st{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.sdot{width:8px;height:8px;border-radius:50%}
.sdot.g{background:var(--gn);box-shadow:0 0 6px var(--gn)}.sdot.r{background:var(--rd);box-shadow:0 0 6px var(--rd)}
.ssub{font-size:12px;color:var(--tx3);margin-top:3px}
/* Filter tabs */
.ftrow{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ft{font-size:12px;font-family:var(--mo);padding:4px 12px;border-radius:20px;border:1px solid var(--br);background:transparent;color:var(--tx2);cursor:pointer;transition:.2s}
.ft.on{background:var(--gnb);color:var(--gn);border-color:rgba(63,185,80,.4)}
.ft:hover:not(.on){border-color:var(--br2);color:var(--tx)}
/* eGift Grid */
.egg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:16px}
.egc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r2);padding:14px 16px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.egc.os{border-color:rgba(88,166,255,.3)}.egc.fl{border-color:rgba(210,153,34,.3)}
.egc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px}
.egc.os::after{background:var(--bl)}.egc.fl::after{background:var(--am)}
.egc:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.5)}
.egc.os:hover{border-color:var(--bl)}.egc.fl:hover{border-color:var(--am)}
.egt{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:7px}
/* Tags */
.tag{font-size:12px;font-family:var(--mo);font-weight:600;padding:4px 9px;border-radius:6px;white-space:nowrap;display:inline-block;letter-spacing:.2px}
.tag.eg{background:rgba(63,185,80,.18);color:#5dd87a;border:1px solid rgba(63,185,80,.45)}
.tag.os{background:rgba(88,166,255,.18);color:#79b8ff;border:1px solid rgba(88,166,255,.45)}
.tag.fl{background:rgba(210,153,34,.18);color:#e3b341;border:1px solid rgba(210,153,34,.45)}
.tag.hd{background:rgba(188,140,255,.18);color:#d2a8ff;border:1px solid rgba(188,140,255,.45)}
.tag.cp{background:rgba(57,211,83,.18);color:#56d364;border:1px solid rgba(57,211,83,.45)}
.tag.id{background:rgba(248,81,73,.18);color:#ff7b72;border:1px solid rgba(248,81,73,.45)}
.tag.ev{background:rgba(188,140,255,.18);color:#d2a8ff;border:1px solid rgba(188,140,255,.45)}
.tag.lc{background:rgba(210,153,34,.18);color:#e3b341;border:1px solid rgba(210,153,34,.45)}
.ec{font-size:14px;font-weight:700;font-family:var(--mo)}
.en{font-size:12px;color:var(--tx2);margin-left:6px}
.egft{font-size:12px;margin:6px 0 3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.eghw{font-size:11px;color:var(--tx3)}
.egbt{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:9px;border-top:1px solid var(--br)}
/* Hot Grid */
.hgg{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:10px;margin-bottom:16px}
.hc{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r2);padding:14px 16px;cursor:pointer;transition:.2s}
.hc:hover{border-color:var(--br2);transform:translateY(-1px)}
.hht{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.rk{font-size:10px;font-family:var(--mo);font-weight:700;padding:2px 8px;border-radius:20px}
.r1{background:rgba(210,153,34,.2);color:var(--am);border:1px solid rgba(210,153,34,.4)}
.r2{background:rgba(139,148,158,.1);color:var(--tx2);border:1px solid var(--br)}
.r3{background:rgba(248,81,73,.1);color:var(--rd);border:1px solid rgba(248,81,73,.3)}
.rn{background:var(--bg3);color:var(--tx3);border:1px solid var(--br)}
.hgft{font-size:12px;margin:5px 0;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hbr{height:2px;background:var(--bg3);border-radius:2px;margin-top:7px}
.hbf{height:2px;background:var(--rd);border-radius:2px}
.hbt{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
/* Price */
.pu{color:var(--rd);font-family:var(--mo);font-size:12px}
.pd{color:var(--gn);font-family:var(--mo);font-size:12px}
/* Info panel */
.ipnl{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r2);padding:16px 20px;margin-bottom:20px;border-left:3px solid var(--gn)}
.iphd{font-size:12px;font-family:var(--mo);color:var(--gn);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.ipdot{width:6px;height:6px;border-radius:50%;background:var(--gn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ipbd{font-size:13px;line-height:1.8}
/* Tab nav */
.tnav{display:flex;border-bottom:1px solid var(--br);margin-bottom:16px}
.tn{font-size:13px;font-family:var(--mo);padding:8px 18px;border:none;background:transparent;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.2s}
.tn.on{color:var(--tx);border-bottom-color:var(--gn)}
.tn:hover:not(.on){color:var(--tx)}
.tp{display:none}.tp.on{display:block}
/* Toolbar */
.tbar{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.sg{display:flex;flex:2;min-width:0}
.sg input{flex:1;min-width:0;background:var(--bg2);border:1px solid var(--br);border-right:none;border-radius:var(--r) 0 0 var(--r);padding:0 12px;height:36px;font-size:13px;color:var(--tx);outline:none;font-family:var(--fn)}
.sg input::placeholder{color:var(--tx3)}
.sg input:focus{border-color:var(--bl)}
.sqb{height:36px;padding:0 14px;font-size:12px;font-family:var(--mo);border:1px solid var(--br);border-left:none;border-radius:0 var(--r) var(--r) 0;background:var(--bg3);color:var(--tx2);cursor:pointer;transition:.2s}
.sqb:hover{color:var(--tx)}
.tbar select{font-size:12px;font-family:var(--mo);flex:1;min-width:0;height:36px;background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);color:var(--tx2);padding:0 10px;outline:none;cursor:pointer}
.tbar select:focus{border-color:var(--bl)}
.hint{font-size:12px;font-family:var(--mo);color:var(--tx3);margin-bottom:8px;min-height:18px}
/* Table */
.tw{overflow-x:auto;border:1px solid var(--br);border-radius:var(--r2);margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg3);color:var(--tx2);font-size:11px;font-family:var(--mo);font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:10px 12px;text-align:center;border-bottom:1px solid var(--br);white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid rgba(48,54,61,.5);vertical-align:middle;text-align:center;color:var(--tx);font-weight:500}
td.tl{text-align:left}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(48,54,61,.4)}
tr.sel td{background:rgba(88,166,255,.08)}
tr.hr td{background:rgba(63,185,80,.05)}
tr.hr:hover td{background:rgba(63,185,80,.1)}
tr.hr.sel td{background:rgba(63,185,80,.14)}
.cf{font-family:var(--mo);font-weight:700;font-size:13px}
.rcw{display:flex;flex-wrap:wrap;gap:4px;align-items:center;justify-content:flex-start}
.ei{display:inline-block;width:13px;height:13px;cursor:pointer;opacity:.2;flex-shrink:0;transition:.15s}
.ei:hover{opacity:.7}
/* Badges */
.badge{display:inline-block;font-size:12px;font-family:var(--mo);font-weight:600;padding:4px 10px;border-radius:6px;white-space:nowrap}
.badge.urgent{background:rgba(248,81,73,.12);color:#ff9991;border:1px solid rgba(248,81,73,.25)}
.badge.soon{background:rgba(210,153,34,.12);color:#d4a42a;border:1px solid rgba(210,153,34,.25)}
.badge.ok{background:rgba(63,185,80,.12);color:#56a06b;border:1px solid rgba(63,185,80,.25)}
.badge.passed{background:rgba(110,118,129,.1);color:var(--tx3);border:1px solid rgba(110,118,129,.2)}
/* Pagination */
.pgn{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.pgi{font-size:12px;font-family:var(--mo);color:var(--tx3)}
.pgbs{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.pgb{min-width:30px;height:28px;padding:0 8px;font-size:12px;font-family:var(--mo);border:1px solid var(--br);border-radius:var(--r);background:transparent;color:var(--tx2);cursor:pointer;transition:.2s;display:inline-flex;align-items:center;justify-content:center}
.pgb:hover{border-color:var(--br2);color:var(--tx)}
.pgb.on{background:var(--gnb);color:var(--gn);border-color:rgba(63,185,80,.4)}
.pgb:disabled{opacity:.3;cursor:default}
.pgb:disabled:hover{background:transparent;color:var(--tx2);border-color:var(--br)}
.pgdots{font-size:12px;color:var(--tx3);padding:0 3px;font-family:var(--mo)}
/* Holdings */
.hp{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r2);padding:18px 20px;margin-bottom:16px}
.hpt{font-size:13px;font-weight:700;font-family:var(--mo);margin-bottom:12px}
.har{display:flex;gap:6px;align-items:center;margin-bottom:10px}
.har input{font-size:13px;font-family:var(--mo);padding:0 10px;height:34px;border:1px solid var(--br);border-radius:var(--r);background:var(--bg3);color:var(--tx);outline:none}
.har input:focus{border-color:var(--bl)}
.har input::placeholder{color:var(--tx3)}
.hcode{width:95px}.hname{width:100px}
.hadd{height:34px;padding:0 14px;font-size:12px;font-family:var(--mo);border:1px solid var(--gn);border-radius:var(--r);background:var(--gnb);color:var(--gn);cursor:pointer;transition:.2s;flex-shrink:0}
.hadd:hover{background:rgba(63,185,80,.2)}
.hpm{font-size:11px;font-family:var(--mo);color:var(--tx3);margin-bottom:10px}
.cr{display:flex;flex-wrap:wrap;gap:5px}
.hchip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-family:var(--mo);border:1px solid var(--br);background:var(--bg3);color:var(--tx2);white-space:nowrap}
.hchip.hg{background:rgba(63,185,80,.08);border-color:rgba(63,185,80,.3);color:var(--gn)}
.hdel{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;font-size:10px;cursor:pointer;opacity:.5;flex-shrink:0;background:rgba(255,255,255,.08);transition:.15s}
.hchip.hg .hdel{background:rgba(63,185,80,.15)}
.hdel:hover{opacity:1}
.errmsg{font-size:12px;font-family:var(--mo);color:var(--rd);margin-top:5px;min-height:16px}
/* Sec btn */
.secbtn{font-size:11px;font-family:var(--mo);padding:4px 12px;height:30px;border-radius:var(--r);border:1px solid var(--br);background:transparent;color:var(--tx2);cursor:pointer;transition:.2s}
.secbtn:hover{border-color:var(--gn);color:var(--gn)}
/* Modal */
.modw{display:none;background:rgba(0,0,0,.75);position:fixed;inset:0;z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modw.open{display:flex}
/* Inline stock detail row */
.detail-tr td{background:var(--bg2)!important;padding:14px 20px!important;border-bottom:1px solid var(--br)!important}
.detail-tr:hover td{background:var(--bg2)!important}
.detail-inner{font-size:15px;line-height:1.9;color:var(--tx)}
.detail-inner strong{font-size:15px;font-family:var(--mo)}
.detail-inner .di-label{color:var(--tx2);font-size:14px}
.detail-close{float:right;font-size:12px;font-family:var(--mo);padding:3px 10px;border-radius:var(--r);border:1px solid var(--br);background:transparent;color:var(--tx3);cursor:pointer;transition:.2s;margin-top:2px}
.detail-close:hover{border-color:var(--rd);color:var(--rd)}
.mod{background:var(--bg2);border:1px solid var(--br2);border-radius:var(--r2);padding:24px;width:340px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.mod h3{font-size:14px;font-weight:700;font-family:var(--mo);margin-bottom:16px;border-bottom:1px solid var(--br);padding-bottom:12px}
.modl{font-size:11px;font-family:var(--mo);color:var(--tx3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.ckr{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;color:var(--tx2);cursor:pointer;padding:6px 10px;border-radius:var(--r);transition:.15s}
.ckr:hover{background:var(--bg3);color:var(--tx)}
.ckr input{accent-color:var(--gn);width:15px;height:15px;cursor:pointer}
.nin{font-size:13px;width:100%;padding:8px 10px;border:1px solid var(--br);border-radius:var(--r);background:var(--bg3);color:var(--tx);resize:vertical;min-height:52px;margin-top:4px;outline:none;font-family:var(--fn)}
.nin:focus{border-color:var(--bl)}
.nin::placeholder{color:var(--tx3)}
.mac{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.bc{font-size:12px;font-family:var(--mo);padding:6px 14px;border-radius:var(--r);border:1px solid var(--br);background:transparent;color:var(--tx2);cursor:pointer;transition:.2s}
.bc:hover{border-color:var(--br2);color:var(--tx)}
.bs2{font-size:12px;font-family:var(--mo);padding:6px 16px;border-radius:var(--r);border:1px solid rgba(63,185,80,.4);background:var(--gnb);color:var(--gn);cursor:pointer;transition:.2s}
.bs2:hover{background:rgba(63,185,80,.2)}

/* Multi-account */
.acct-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.acct-tab{font-size:12px;font-family:var(--mo);padding:5px 14px;border-radius:20px;border:1px solid var(--br);background:transparent;color:var(--tx2);cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px;position:relative}
.acct-tab.on{background:var(--gnb);color:var(--gn);border-color:rgba(63,185,80,.4)}
.acct-tab:hover:not(.on){border-color:var(--br2);color:var(--tx)}
.acct-del{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;font-size:10px;background:rgba(255,255,255,.1);opacity:.5;cursor:pointer;transition:.15s;flex-shrink:0}
.acct-del:hover{opacity:1;background:var(--rdb);color:var(--rd)}
.acct-add{font-size:12px;font-family:var(--mo);padding:5px 12px;border-radius:20px;border:1px solid var(--br);background:transparent;color:var(--tx3);cursor:pointer;transition:.2s}
.acct-add:hover{border-color:var(--gn);color:var(--gn)}
.acct-sect{background:var(--bg2);border:1px solid var(--br);border-radius:var(--r2);padding:18px 20px;margin-bottom:12px}
.acct-name-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.acct-name-row input{font-size:13px;font-family:var(--mo);padding:0 10px;height:32px;border:1px solid var(--br);border-radius:var(--r);background:var(--bg3);color:var(--tx);outline:none;width:160px}
.acct-name-row input:focus{border-color:var(--bl)}
.acct-label{font-size:12px;font-family:var(--mo);color:var(--tx2)}
.acct-rename{font-size:11px;font-family:var(--mo);padding:3px 10px;border-radius:var(--r);border:1px solid var(--br);background:transparent;color:var(--tx3);cursor:pointer;transition:.2s}
.acct-rename:hover{border-color:var(--br2);color:var(--tx)}
.acct-color{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:.15s}
.acct-color.sel{border-color:var(--tx)}
.color-picks{display:flex;gap:6px;align-items:center;margin-bottom:14px}

/* Refresh button */
.refresh-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-family:var(--mo);padding:0 14px;height:36px;border-radius:var(--r);border:1px solid var(--br);background:transparent;color:var(--tx2);cursor:pointer;transition:.2s;white-space:nowrap;flex-shrink:0}
.refresh-btn:hover{border-color:var(--bl);color:var(--bl)}
.refresh-btn.loading{border-color:var(--am);color:var(--am);pointer-events:none}
.refresh-btn.done{border-color:var(--gn);color:var(--gn)}
.refresh-btn.err{border-color:var(--rd);color:var(--rd)}
.refresh-btn .spin{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}
.refresh-status{font-size:11px;font-family:var(--mo);color:var(--tx3);margin-left:4px}
/* ── Responsive ─────────────────────────────────────────── */
@media(max-width:768px){
  .hdr{padding:0 14px}
  .hdr-in{height:50px;gap:8px}
  .logo{font-size:14px}
  .hbadge{display:none}
  .hlink{padding:5px 8px}
  .main{padding:14px}
  .mets{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:18px}
  .met{padding:12px 14px}
  .met-v{font-size:22px}
  .met-l{font-size:10px}
  .dv{margin:18px 0}
  .st{font-size:14px}
  .ssub{font-size:11px}
  .sh{flex-wrap:wrap;gap:8
